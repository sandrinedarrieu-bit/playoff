<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stade des Lilas — TerrainLink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="demo-badge">Démo / Données fictives</div>
<div class="app">

  <div class="detail-img" style="background-image:url('https://images.unsplash.com/photo-1518604666860-9ed391f76460?w=900&q=80')">
    <a href="index.html" class="back">←</a>
    <div class="sport-badge">⚽ Foot</div>
  </div>

  <div class="detail-content">
    <div class="detail-head">
      <h1>Stade des Lilas</h1>
      <div class="detail-price">
        <div class="amount">45€</div>
        <div class="unit">par heure</div>
      </div>
    </div>
    <div class="detail-meta">
      <span>1,2 km</span>
      <span>·</span>
      <span class="star">★ 4.8</span>
      <span>(124 avis)</span>
    </div>
    <div class="detail-address">12 rue des Lilas, Paris 20e</div>

    <div class="detail-section">
      <h3>Capacité</h3>
      <div class="chips">
        <div class="chip">Jusqu'à 10 joueurs</div>
      </div>
    </div>

    <div class="detail-section">
      <h3>Équipements</h3>
      <div class="chips">
        <div class="chip">Vestiaires</div>
        <div class="chip">Douches</div>
        <div class="chip">Éclairage LED</div>
        <div class="chip">Parking</div>
      </div>
    </div>

    <div class="detail-section">
      <h3>Créneaux 7 prochains jours</h3>
      <div class="day-row">
        <div class="day-pill selected"><div class="dow">Jeu</div><div class="num">1</div></div>
        <div class="day-pill"><div class="dow">Ven</div><div class="num">2</div></div>
        <div class="day-pill"><div class="dow">Sam</div><div class="num">3</div></div>
        <div class="day-pill"><div class="dow">Dim</div><div class="num">4</div></div>
        <div class="day-pill"><div class="dow">Lun</div><div class="num">5</div></div>
        <div class="day-pill"><div class="dow">Mar</div><div class="num">6</div></div>
        <div class="day-pill"><div class="dow">Mer</div><div class="num">7</div></div>
      </div>
    </div>

  </div>

  <div class="price-bar">
    <a href="ecran3-reservation.html" class="btn-primary btn-block">Réserver ce terrain</a>
  </div>

</div>

</html>
